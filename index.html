<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDM Project Roadmap — Porsche Middle East</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--dark:#0A0F1E;--panel:#111827;--border:#1E2940;--muted:#374151;--text:#E2E8F0;--subtle:#64748B;--white:#FFFFFF;--accent:#C8A96E;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100vh;}
.header{background:linear-gradient(135deg,#0A0F1E 0%,#0D1829 50%,#0A1520 100%);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:20px;}
.logo-mark{width:36px;height:36px;background:var(--accent);display:grid;place-items:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#0A0F1E;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white);}
.header-subtitle{font-size:11px;color:var(--subtle);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.badge{background:rgba(200,169,110,0.12);border:1px solid rgba(200,169,110,0.3);color:var(--accent);font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;letter-spacing:1px;text-transform:uppercase;}
.filters{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--subtle);white-space:nowrap;}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{background:transparent;border:1px solid var(--border);color:var(--subtle);padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;}
.filter-chip:hover{border-color:var(--accent);color:var(--accent);}
.filter-chip.active{border-color:transparent;color:#fff;font-weight:600;}
.filter-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.clear-btn{background:transparent;border:1px solid rgba(200,169,110,0.3);color:var(--accent);padding:5px 14px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;display:none;align-items:center;gap:6px;}
.clear-btn:hover{background:rgba(200,169,110,0.1);}
.clear-btn.visible{display:flex;}
.active-bar{background:rgba(200,169,110,0.06);border-bottom:1px solid rgba(200,169,110,0.15);padding:6px 32px;display:none;align-items:center;gap:8px;font-size:11px;}
.active-bar.visible{display:flex;}
.active-tag{background:rgba(200,169,110,0.15);border:1px solid rgba(200,169,110,0.3);color:var(--accent);padding:2px 10px;font-size:10px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
.active-tag:hover{background:rgba(200,169,110,0.25);}
.view-tabs{display:flex;gap:2px;background:var(--dark);padding:16px 32px 0;border-bottom:1px solid var(--border);}
.view-tab{padding:10px 24px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--subtle);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-weight:500;}
.view-tab:hover{color:var(--text);}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{padding:24px 32px;overflow-x:auto;}
.view{display:none;}.view.active{display:block;}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat{background:var(--panel);border:1px solid var(--border);padding:12px 20px;display:flex;flex-direction:column;gap:2px;min-width:90px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--white);}
.stat-val.gold{color:var(--accent);}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--subtle);}
.legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--subtle);}
.legend-swatch{width:10px;height:10px;flex-shrink:0;}
.roadmap-grid{min-width:1100px;}
.month-headers{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-bottom:2px;}
.month-header{background:var(--panel);border:1px solid var(--border);text-align:center;padding:8px 4px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--subtle);}
.month-header.active{color:var(--text);border-color:var(--muted);}
.roadmap-body{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;}
.month-col{display:flex;flex-direction:column;gap:2px;}
.chip{padding:6px 8px;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.15s;min-height:32px;display:flex;align-items:center;line-height:1.2;border-left:3px solid rgba(255,255,255,0.25);}
.chip:hover{filter:brightness(1.2);transform:translateY(-1px);}
.empty-chip{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);min-height:32px;}
.gantt{min-width:1300px;}
.gantt-header{display:grid;grid-template-columns:140px 220px repeat(12,1fr);gap:2px;margin-bottom:2px;position:sticky;top:64px;z-index:10;background:var(--dark);}
.gantt-hcell{background:#0D1829;border:1px solid var(--border);padding:8px 6px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--subtle);text-align:center;}
.gantt-hcell.lbl{color:var(--text);text-align:left;padding-left:10px;}
.gantt-row{display:grid;grid-template-columns:140px 220px repeat(12,1fr);gap:2px;margin-bottom:2px;}
.gantt-market{padding:8px 10px;font-size:10px;font-weight:600;display:flex;align-items:center;}
.gantt-uc{padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);font-size:11px;color:var(--text);display:flex;align-items:center;line-height:1.3;}
.gantt-cell{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);min-height:36px;}
.gantt-bar{height:100%;min-height:36px;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter 0.15s;}
.gantt-bar:hover{filter:brightness(1.15);}
.gantt-spacer{grid-column:1/-1;height:3px;background:var(--border);margin:2px 0;}
.tooltip{position:fixed;background:#1E2940;border:1px solid var(--accent);padding:14px 16px;max-width:280px;pointer-events:none;z-index:999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.tooltip.visible{display:block;}
.tt-uc{font-weight:600;font-size:12px;color:var(--white);margin-bottom:8px;line-height:1.4;}
.tt-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:4px;}
.tt-key{color:var(--subtle);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;}
.tt-val{color:var(--text);font-size:10px;font-weight:500;text-align:right;}
.tt-desc{font-size:10px;color:var(--subtle);margin-top:8px;border-top:1px solid var(--border);padding-top:8px;line-height:1.5;}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.loading{display:flex;align-items:center;justify-content:center;height:300px;color:var(--subtle);font-size:13px;}
.loading-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{color:#F87171;text-align:center;padding:40px;font-size:12px;line-height:2;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--muted);}
</style>
</head>
<body>
<div class="tooltip" id="tooltip">
  <div class="tt-uc" id="tt-uc"></div>
  <div class="tt-row"><span class="tt-key">Market</span><span class="tt-val" id="tt-market"></span></div>
  <div class="tt-row"><span class="tt-key">Category</span><span class="tt-val" id="tt-cat"></span></div>
  <div class="tt-row"><span class="tt-key">Timeline</span><span class="tt-val" id="tt-timeline"></span></div>
  <div class="tt-row"><span class="tt-key">Status</span><span class="tt-val" id="tt-status"></span></div>
  <div class="tt-row"><span class="tt-key">Priority</span><span class="tt-val" id="tt-priority"></span></div>
  <div class="tt-desc" id="tt-desc"></div>
</div>
<header class="header">
  <div class="header-left">
    <div class="logo-mark">P</div>
    <div>
      <div class="header-title">DDM Project Roadmap</div>
      <div class="header-subtitle">Porsche Middle East &amp; Africa &nbsp;&middot;&nbsp; 2026</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge" id="uc-count">Loading...</div>
    <div class="badge" id="last-updated">Live</div>
  </div>
</header>
<div class="filters">
  <span class="filter-label">Market</span><div class="filter-group" id="mf"></div>
  <div class="filter-divider"></div>
  <span class="filter-label">Category</span><div class="filter-group" id="cf"></div>
  <div class="filter-divider"></div>
  <span class="filter-label">Status</span><div class="filter-group" id="sf"></div>
  <div class="filter-divider"></div>
  <button class="clear-btn" id="clear-btn" onclick="clearAll()">&#10005; Clear all filters</button>
</div>
<div class="active-bar" id="active-bar">
  <span style="font-size:10px;color:var(--subtle);text-transform:uppercase;letter-spacing:1px;margin-right:4px;">Active:</span>
  <div id="active-tags"></div>
</div>
<div class="view-tabs">
  <div class="view-tab active" onclick="switchView('roadmap',this)">&#9671; Roadmap</div>
  <div class="view-tab" onclick="switchView('gantt',this)">&#9776; Execution Timeline</div>
</div>
<div class="content">
  <div class="stats-bar" id="stats"></div>
  <div class="view active" id="view-roadmap">
    <div class="legend" id="legend"></div>
    <div class="roadmap-grid" id="rgrid"><div class="loading"><div class="loading-spinner"></div>Loading live data...</div></div>
  </div>
  <div class="view" id="view-gantt"><div class="gantt" id="ggrid"></div></div>
</div>

<script>
// Fetches from our own Vercel serverless function — no CORS issues
const DATA_URL = "/api/data";

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MABBR=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const MIDX={};MONTHS.forEach((m,i)=>MIDX[m]=i);
const MS={"Brand (PME)":{bg:"#1A2B4A",txt:"#fff",code:"PME"},"Dubai":{bg:"#276749",txt:"#fff",code:"DXB"},"Kuwait":{bg:"#B7950B",txt:"#fff",code:"KWT"},"KSA":{bg:"#742A2A",txt:"#fff",code:"KSA"},"India":{bg:"#2B6CB0",txt:"#fff",code:"IND"},"Qatar":{bg:"#2C7A7B",txt:"#fff",code:"QTR"},"Abu Dhabi":{bg:"#553C9A",txt:"#fff",code:"AUH"},"Morocco":{bg:"#744210",txt:"#fff",code:"MAR"},"Oman":{bg:"#276749",txt:"#fff",code:"OMN"}};
const CS={"Event Management":{bg:"#2563EB",txt:"#fff"},"CRM Automation":{bg:"#2563EB",txt:"#fff"},"Sales":{bg:"#059669",txt:"#fff"},"Inbound":{bg:"#059669",txt:"#fff"},"Digital":{bg:"#D97706",txt:"#fff"},"Aftersales":{bg:"#EA580C",txt:"#fff"},"Analytics":{bg:"#7C3AED",txt:"#fff"},"Re-engagement":{bg:"#DB2777",txt:"#fff"},"Data Intelligence":{bg:"#0D9488",txt:"#fff"}};
const SS={"Complete":"#10B981","In Progress":"#F59E0B","Planned":"#3B82F6","TBC":"#6B7280"};
const MORDER=["Brand (PME)","Dubai","Kuwait","KSA","India","Qatar","Abu Dhabi","Morocco","Oman"];
let aM=new Set(),aC=new Set(),aS=new Set(),RAW=[];

function stripEmoji(s){return s.replace(/[\u{1F1E0}-\u{1F1FF}\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,"").trim();}
function toMonth(v){
  if(!v)return"";
  const f=MONTHS.find(m=>v.toLowerCase().startsWith(m.toLowerCase().slice(0,3)));
  if(f)return f;
  const d=new Date(v);
  return isNaN(d)?v:MONTHS[d.getMonth()];
}
function parseRow(cells,idx){
  let mkt=stripEmoji((cells[idx.market]||"").trim());
  if(!mkt||mkt==="PME"||mkt==="All Markets")mkt="Brand (PME)";
  return{uc:(cells[idx.uc]||"").trim(),level:(cells[idx.level]||"").trim(),market:mkt,category:(cells[idx.category]||"").trim(),description:(cells[idx.desc]||"").trim(),start:toMonth((cells[idx.start]||"").trim()),golive:toMonth((cells[idx.golive]||"").trim()),status:(cells[idx.status]||"").trim(),priority:(cells[idx.priority]||"").trim()};
}
function parseCSV(text){
  const rows=text.trim().split("\n").map(l=>{
    const c=[];let s="",q=false;
    for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){s+='"';i++;}else q=!q;}else if(ch===","&&!q){c.push(s.replace(/^"|"$/g,"").trim());s="";}else s+=ch;}
    c.push(s.replace(/^"|"$/g,"").trim());return c;
  });
  let hi=0;
  for(let i=0;i<Math.min(8,rows.length);i++){if(rows[i].some(c=>c.toUpperCase().includes("USE CASE"))){hi=i;break;}}
  const hdr=rows[hi].map(h=>h.toUpperCase());
  const fc=(names)=>{for(const n of names){const i=hdr.findIndex(h=>h.includes(n));if(i>=0)return i;}return 0;};
  const idx={uc:fc(["USE CASE NAME","USE CASE"]),level:fc(["LEVEL"]),market:fc(["MARKET"]),category:fc(["CATEGORY"]),desc:fc(["BRIEF DESCRIPTION","DESCRIPTION"]),start:fc(["START MONTH","START"]),golive:fc(["GO LIVE MONTH","COMPLETION MONTH","GO LIVE"]),status:fc(["STATUS"]),priority:fc(["PRIORITY"])};
  return rows.slice(hi+1).map(c=>parseRow(c,idx)).filter(r=>r.uc&&MIDX.hasOwnProperty(r.golive));
}

async function loadData(){
  try{
    const res=await fetch(DATA_URL);
    if(!res.ok)throw new Error("HTTP "+res.status);
    const csv=await res.text();
    RAW=parseCSV(csv);
    if(!RAW.length)throw new Error("No rows parsed — check Sheet is published");
    const t=new Date();
    document.getElementById("last-updated").textContent="Updated "+t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");
    buildFilters();render();
  }catch(e){
    document.getElementById("rgrid").innerHTML=`<div class="err">Could not load live data.<br><small style="color:var(--subtle)">${e.message}</small><br><br><button onclick="loadData()" style="background:var(--accent);color:#0A0F1E;border:none;padding:8px 20px;cursor:pointer;font-family:inherit;font-size:12px;">Retry</button></div>`;
    document.getElementById("uc-count").textContent="Error";
  }
}

function filtered(){return RAW.filter(r=>(!aM.size||aM.has(r.market))&&(!aC.size||aC.has(r.category))&&(!aS.size||aS.has(r.status)));}

function buildFilters(){
  const mkts=[...new Set(RAW.map(r=>r.market))].sort((a,b)=>(MORDER.indexOf(a)<0?99:MORDER.indexOf(a))-(MORDER.indexOf(b)<0?99:MORDER.indexOf(b)));
  const cats=[...new Set(RAW.map(r=>r.category))].filter(Boolean).sort();
  const sts=[...new Set(RAW.map(r=>r.status))].filter(Boolean);
  ["mf","cf","sf"].forEach(id=>document.getElementById(id).innerHTML="");
  mkts.forEach(m=>{const s=MS[m]||{bg:"#374151",code:m.slice(0,3).toUpperCase()};mkBtn("mf",s.code,m,aM,s.bg);});
  cats.forEach(c=>{const s=CS[c]||{bg:"#374151"};mkBtn("cf",c,c,aC,s.bg);});
  sts.forEach(s=>mkBtn("sf",s,s,aS,"#374151"));
}
function mkBtn(pid,label,val,set,bg){
  const b=document.createElement("button");
  b.className="filter-chip";b.textContent=label;b.title=val;b.id="fc-"+pid+"-"+val.replace(/[^a-z0-9]/gi,"-");
  b.onclick=()=>{tog(set,val,b,bg);updateBar();render();};
  document.getElementById(pid).appendChild(b);
}
function tog(set,val,btn,bg){
  if(set.has(val)){set.delete(val);btn.className="filter-chip";btn.style.cssText="";}
  else{set.add(val);btn.className="filter-chip active";btn.style.background=bg;btn.style.borderColor=bg;btn.style.color="#fff";}
}
function clearAll(){
  [aM,aC,aS].forEach(s=>s.clear());
  document.querySelectorAll(".filter-chip").forEach(b=>{b.className="filter-chip";b.style.cssText="";});
  updateBar();render();
}
function updateBar(){
  const all=[...[...aM].map(v=>({v,sid:"mf"})),...[...aC].map(v=>({v,sid:"cf"})),...[...aS].map(v=>({v,sid:"sf"}))];
  const bar=document.getElementById("active-bar"),cb=document.getElementById("clear-btn"),tags=document.getElementById("active-tags");
  if(!all.length){bar.classList.remove("visible");cb.classList.remove("visible");return;}
  bar.classList.add("visible");cb.classList.add("visible");
  tags.innerHTML=all.map(({v,sid})=>`<span class="active-tag" onclick="removeTag('${sid}','${v.replace(/'/g,"\\'")}')"><span>${v}</span><span>&times;</span></span>`).join(" ");
}
function removeTag(sid,val){
  const set=sid==="mf"?aM:sid==="cf"?aC:aS;
  const btn=document.getElementById("fc-"+sid+"-"+val.replace(/[^a-z0-9]/gi,"-"));
  if(btn){btn.className="filter-chip";btn.style.cssText="";}
  set.delete(val);updateBar();render();
}

function renderStats(d){
  const c=d.filter(r=>r.status==="Complete").length,ip=d.filter(r=>r.status==="In Progress").length,m=new Set(d.map(r=>r.market)).size,p=d.length?Math.round(c/d.length*100):0;
  document.getElementById("stats").innerHTML=[{v:d.length,l:"Use Cases",g:true},{v:c,l:"Complete",g:false},{v:ip,l:"In Progress",g:false},{v:m,l:"Markets",g:false},{v:p+"%",l:"Completion",g:true}].map(x=>`<div class="stat"><div class="stat-val ${x.g?"gold":""}">${x.v}</div><div class="stat-lbl">${x.l}</div></div>`).join("");
  document.getElementById("uc-count").textContent=d.length+" Use Cases";
}
function renderLegend(d){
  document.getElementById("legend").innerHTML=[...new Set(d.map(r=>r.category))].filter(Boolean).map(c=>{const s=CS[c]||{bg:"#374151"};return`<div class="legend-item"><div class="legend-swatch" style="background:${s.bg}"></div>${c}</div>`;}).join("");
}
function renderRoadmap(d){
  const mg={};MONTHS.forEach(m=>mg[m]=[]);d.forEach(r=>{if(mg[r.golive])mg[r.golive].push(r);});
  const max=Math.max(...MONTHS.map(m=>mg[m].length),1);
  let h='<div class="month-headers">'+MONTHS.map((m,i)=>`<div class="month-header ${mg[m].length?"active":""}">${MABBR[i]}</div>`).join("")+'</div><div class="roadmap-body">';
  MONTHS.forEach(m=>{
    h+='<div class="month-col">';
    for(let i=0;i<max;i++){
      if(i<mg[m].length){const r=mg[m][i];const ms=MS[r.market]||{code:"?",bg:"#374151",txt:"#fff"};const cs=CS[r.category]||{bg:"#374151",txt:"#fff"};const e=btoa(unescape(encodeURIComponent(JSON.stringify(r))));h+=`<div class="chip" style="background:${cs.bg};color:${cs.txt}" onmouseenter="tip(event,'${e}')" onmouseleave="ht()"><span style="opacity:.65;margin-right:5px;font-size:9px;font-family:'DM Mono',monospace">${ms.code}</span>${r.uc}</div>`;}
      else h+='<div class="empty-chip"></div>';
    }
    h+='</div>';
  });
  document.getElementById("rgrid").innerHTML=h+'</div>';
}
function renderGantt(d){
  const g={};MORDER.forEach(m=>g[m]=[]);d.forEach(r=>{if(!g[r.market])g[r.market]=[];g[r.market].push(r);});
  let h='<div class="gantt-header"><div class="gantt-hcell lbl">MARKET</div><div class="gantt-hcell lbl">USE CASE</div>'+MABBR.map(a=>`<div class="gantt-hcell">${a}</div>`).join("")+'</div>';
  MORDER.forEach(mk=>{
    const ul=g[mk];if(!ul||!ul.length)return;
    const ms=MS[mk]||{bg:"#374151",txt:"#fff",code:mk};
    ul.forEach((r,i)=>{
      const cs=CS[r.category]||{bg:"#374151",txt:"#fff"};const si=MIDX[r.start]??MIDX[r.golive]??0;const ei=MIDX[r.golive]??0;const e=btoa(unescape(encodeURIComponent(JSON.stringify(r))));
      h+=`<div class="gantt-row"><div class="gantt-market" style="background:${ms.bg};color:${ms.txt}">${i===0?mk:""}</div><div class="gantt-uc" onmouseenter="tip(event,'${e}')" onmouseleave="ht()">${r.uc}</div>`;
      let c=0;while(c<12){if(c===si){h+=`<div class="gantt-bar" style="background:${cs.bg};color:${cs.txt};grid-column:span ${ei-si+1}" onmouseenter="tip(event,'${e}')" onmouseleave="ht()">${ms.code}: ${r.uc}</div>`;c=ei+1;}else{h+='<div class="gantt-cell"></div>';c++;}}
      h+='</div>';
    });
    h+='<div class="gantt-spacer"></div>';
  });
  document.getElementById("ggrid").innerHTML=h;
}
function tip(e,enc){
  const r=JSON.parse(decodeURIComponent(escape(atob(enc))));const sc=SS[r.status]||"#6B7280";
  document.getElementById("tt-uc").textContent=r.uc;document.getElementById("tt-market").textContent=r.market;document.getElementById("tt-cat").textContent=r.category;
  document.getElementById("tt-timeline").textContent=r.start===r.golive?r.golive:`${r.start} → ${r.golive}`;
  document.getElementById("tt-status").innerHTML=`<span class="sdot" style="background:${sc}"></span>${r.status}`;
  document.getElementById("tt-priority").textContent=r.priority||"—";
  const dd=document.getElementById("tt-desc");dd.textContent=r.description||"";dd.style.display=r.description?"block":"none";
  const tt=document.getElementById("tooltip");tt.classList.add("visible");mv(e);
}
function mv(e){const tt=document.getElementById("tooltip");const x=e.clientX+16,y=e.clientY-10;tt.style.left=(x+290>window.innerWidth?x-300:x)+"px";tt.style.top=(y+200>window.innerHeight?y-180:y)+"px";}
function ht(){document.getElementById("tooltip").classList.remove("visible");}
document.addEventListener("mousemove",e=>{if(document.getElementById("tooltip").classList.contains("visible"))mv(e);});
function switchView(n,t){document.querySelectorAll(".view-tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));t.classList.add("active");document.getElementById("view-"+n).classList.add("active");}
function render(){const d=filtered();renderStats(d);renderLegend(d);renderRoadmap(d);renderGantt(d);}
loadData();
</script>
</body>
