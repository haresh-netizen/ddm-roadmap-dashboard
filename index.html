<style>
:root {
  --dark:#0A0F1E; --panel:#111827; --border:#1E2940; --muted:#374151;
  --text:#E2E8F0; --subtle:#64748B; --white:#FFFFFF; --accent:#C8A96E;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100vh;}
/* HEADER */
.header{background:linear-gradient(135deg,#0A0F1E 0%,#0D1829 50%,#0A1520 100%);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:20px;}
.logo-mark{width:36px;height:36px;background:var(--accent);display:grid;place-items:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#0A0F1E;letter-spacing:0.5px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white);}
.header-subtitle{font-size:11px;color:var(--subtle);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.badge{background:rgba(200,169,110,0.12);border:1px solid rgba(200,169,110,0.3);color:var(--accent);font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;letter-spacing:1px;text-transform:uppercase;}
/* FILTERS */
.filters{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--subtle);white-space:nowrap;}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{background:transparent;border:1px solid var(--border);color:var(--subtle);padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;}
.filter-chip:hover{border-color:var(--accent);color:var(--accent);}
.filter-chip.active{border-color:transparent;color:#fff;font-weight:600;}
.filter-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
/* TABS */
.view-tabs{display:flex;gap:2px;background:var(--dark);padding:16px 32px 0;border-bottom:1px solid var(--border);}
.view-tab{padding:10px 24px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--subtle);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-weight:500;}
.view-tab:hover{color:var(--text);}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
/* CONTENT */
.content{padding:24px 32px;overflow-x:auto;}
.view{display:none;}
.view.active{display:block;}
/* STATS */
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat{background:var(--panel);border:1px solid var(--border);padding:12px 20px;display:flex;flex-direction:column;gap:2px;min-width:90px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--white);}
.stat-val.gold{color:var(--accent);}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--subtle);}
/* LEGEND */
.legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--subtle);}
.legend-swatch{width:10px;height:10px;flex-shrink:0;}
/* ROADMAP */
.roadmap-grid{min-width:1100px;}
.month-headers{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-bottom:2px;}
.month-header{background:var(--panel);border:1px solid var(--border);text-align:center;padding:8px 4px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--subtle);}
.month-header.active{color:var(--text);border-color:var(--muted);}
.roadmap-body{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;}
.month-col{display:flex;flex-direction:column;gap:2px;}
.chip{padding:6px 8px;font-size:10px;font-weight:600;letter-spacing:0.3px;cursor:pointer;transition:all 0.15s;min-height:32px;display:flex;align-items:center;line-height:1.2;border-left:3px solid rgba(255,255,255,0.25);}
.chip:hover{filter:brightness(1.2);transform:translateY(-1px);}
.empty-chip{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);min-height:32px;}
/* GANTT */
.gantt{min-width:1300px;}
.gantt-header{display:grid;grid-template-columns:140px 220px repeat(12,1fr);gap:2px;margin-bottom:2px;position:sticky;top:64px;z-index:10;background:var(--dark);}
.gantt-hcell{background:#0D1829;border:1px solid var(--border);padding:8px 6px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--subtle);text-align:center;}
.gantt-hcell.lbl{color:var(--text);text-align:left;padding-left:10px;}
.gantt-row{display:grid;grid-template-columns:140px 220px repeat(12,1fr);gap:2px;margin-bottom:2px;}
.gantt-market{padding:8px 10px;font-size:10px;font-weight:600;letter-spacing:0.5px;display:flex;align-items:center;}
.gantt-uc{padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);font-size:11px;color:var(--text);display:flex;align-items:center;line-height:1.3;cursor:default;}
.gantt-cell{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);min-height:36px;}
.gantt-bar{height:100%;min-height:36px;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;letter-spacing:0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter 0.15s;}
.gantt-bar:hover{filter:brightness(1.15);}
.gantt-spacer{grid-column:1/-1;height:3px;background:var(--border);margin:2px 0;}
/* TOOLTIP */
.tooltip{position:fixed;background:#1E2940;border:1px solid var(--accent);padding:14px 16px;max-width:280px;pointer-events:none;z-index:999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.tooltip.visible{display:block;}
.tt-uc{font-weight:600;font-size:12px;color:var(--white);margin-bottom:8px;line-height:1.4;}
.tt-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:4px;}
.tt-key{color:var(--subtle);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;}
.tt-val{color:var(--text);font-size:10px;font-weight:500;text-align:right;}
.tt-desc{font-size:10px;color:var(--subtle);margin-top:8px;border-top:1px solid var(--border);padding-top:8px;line-height:1.5;}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--muted);}
</style>
</head>

  "India":{bg:"#2B6CB0",txt:"#fff",code:"IND"},
  "Qatar":{bg:"#2C7A7B",txt:"#fff",code:"QTR"},
  "Abu Dhabi":{bg:"#553C9A",txt:"#fff",code:"AUH"},
  "Morocco":{bg:"#744210",txt:"#fff",code:"MAR"},
  "Oman":{bg:"#276749",txt:"#fff",code:"OMN"}
};
const CS={
  "Event Management":{bg:"#2563EB",txt:"#fff"},
  "CRM Automation":{bg:"#2563EB",txt:"#fff"},
  "Sales":{bg:"#059669",txt:"#fff"},
  "Inbound":{bg:"#059669",txt:"#fff"},
  "Digital":{bg:"#D97706",txt:"#fff"},
  "Aftersales":{bg:"#EA580C",txt:"#fff"},
  "Analytics":{bg:"#7C3AED",txt:"#fff"},
  "Re-engagement":{bg:"#DB2777",txt:"#fff"},
  "Data Intelligence":{bg:"#0D9488",txt:"#fff"}
};
const SS={"Complete":"#10B981","In Progress":"#F59E0B","Planned":"#3B82F6","TBC":"#6B7280"};
const MORDER=["Brand (PME)","Dubai","Kuwait","KSA","India","Qatar","Abu Dhabi","Morocco","Oman"];
let aM=new Set(),aC=new Set(),aS=new Set();

function filtered(){
  return DATA.filter(r=>{
    return (!aM.size||aM.has(r.market))&&(!aC.size||aC.has(r.category))&&(!aS.size||aS.has(r.status))&&MIDX.hasOwnProperty(r.golive);
  });
}

function buildFilters(){
  const markets=[...new Set(DATA.map(r=>r.market))].sort((a,b)=>{
    const ia=MORDER.indexOf(a),ib=MORDER.indexOf(b);
    return(ia<0?99:ia)-(ib<0?99:ib);
  });
  const cats=[...new Set(DATA.map(r=>r.category))].filter(Boolean).sort();
  const stats=[...new Set(DATA.map(r=>r.status))].filter(Boolean);

  markets.forEach(m=>{
    const s=MS[m]||{bg:"#374151",txt:"#fff",code:m.slice(0,3).toUpperCase()};
    btn("mf",s.code,m,()=>tog(aM,m,s.bg));
  });
  cats.forEach(c=>{
    const s=CS[c]||{bg:"#374151"};
    btn("cf",c,c,()=>tog(aC,c,s.bg));
  });
  stats.forEach(s=>{
    btn("sf",s,s,()=>tog(aS,s,"#374151"));
  });
}

function btn(pid,label,val,cb){
  const b=document.createElement("button");
  b.className="filter-chip";b.textContent=label;b.title=val;
  b._val=val;b._cb=cb;b._pid=pid;
  b.onclick=()=>{cb();render();};
  document.getElementById(pid).appendChild(b);
}

function tog(set,val,bg){
  const btns=document.querySelectorAll(".filter-chip");
  btns.forEach(b=>{
    if(b._val===val&&b.textContent===val||b.title===val&&b.textContent!==val||b._val===val){
      if(set.has(val)){set.delete(val);b.className="filter-chip";b.style.cssText="";}
      else{set.add(val);b.className="filter-chip active";b.style.background=bg;b.style.borderColor=bg;b.style.color="#fff";}
    }
  });
}

function renderStats(d){
  const complete=d.filter(r=>r.status==="Complete").length;
  const inp=d.filter(r=>r.status==="In Progress").length;
  const mkts=new Set(d.map(r=>r.market)).size;
  const pct=d.length?Math.round(complete/d.length*100):0;
  document.getElementById("stats").innerHTML=
    stat(d.length,"Use Cases",true)+stat(complete,"Complete",false)+
    stat(inp,"In Progress",false)+stat(mkts,"Markets",false)+stat(pct+"%","Completion",true);
  document.getElementById("uc-count").textContent=d.length+" Use Cases";
}
function stat(v,l,g){return`<div class="stat"><div class="stat-val ${g?"gold":""}">${v}</div><div class="stat-lbl">${l}</div></div>`;}

function renderLegend(d){
  const cats=[...new Set(d.map(r=>r.category))].filter(Boolean);
  document.getElementById("legend").innerHTML=cats.map(c=>{
    const s=CS[c]||{bg:"#374151"};
    return`<div class="legend-item"><div class="legend-swatch" style="background:${s.bg}"></div>${c}</div>`;
  }).join("");
}

function renderRoadmap(d){
  const mg={};MONTHS.forEach(m=>mg[m]=[]);
  d.forEach(r=>{if(mg[r.golive])mg[r.golive].push(r);});
  const max=Math.max(...MONTHS.map(m=>mg[m].length),1);

  let h="<div class='month-headers'>";
  MONTHS.forEach((m,i)=>h+=`<div class="month-header ${mg[m].length?"active":""}">${MABBR[i]}</div>`);
  h+="</div><div class='roadmap-body'>";
  MONTHS.forEach(m=>{
    h+="<div class='month-col'>";
    for(let s=0;s<max;s++){
      if(s<mg[m].length){
        const r=mg[m][s];
        const ms=MS[r.market]||{code:"?",bg:"#374151",txt:"#fff"};
        const cs=CS[r.category]||{bg:"#374151",txt:"#fff"};
        const d2=btoa(unescape(encodeURIComponent(JSON.stringify(r))));
        h+=`<div class="chip" style="background:${cs.bg};color:${cs.txt}" onmouseenter="st(event,'${d2}')" onmouseleave="ht()"><span style="opacity:0.65;margin-right:5px;font-size:9px;font-family:'DM Mono',monospace">${ms.code}</span>${r.uc}</div>`;
      } else {
        h+="<div class='empty-chip'></div>";
      }
    }
    h+="</div>";
  });
  h+="</div>";
  document.getElementById("rgrid").innerHTML=h;
}

function renderGantt(d){
  const groups={};
  MORDER.forEach(m=>groups[m]=[]);
  d.forEach(r=>{if(!groups[r.market])groups[r.market]=[];groups[r.market].push(r);});

  let h="<div class='gantt-header'>";
  h+="<div class='gantt-hcell lbl'>MARKET</div><div class='gantt-hcell lbl'>USE CASE</div>";
  MABBR.forEach(a=>h+=`<div class="gantt-hcell">${a}</div>`);
  h+="</div>";

  MORDER.forEach(mkey=>{
    const ul=groups[mkey];
    if(!ul||!ul.length)return;
    const ms=MS[mkey]||{bg:"#374151",txt:"#fff",code:mkey};
    ul.forEach((r,i)=>{
      const cs=CS[r.category]||{bg:"#374151",txt:"#fff"};
      const si=MIDX[r.start]??MIDX[r.golive]??0;
      const ei=MIDX[r.golive]??0;
      const d2=btoa(unescape(encodeURIComponent(JSON.stringify(r))));
      h+=`<div class="gantt-row">`;
      h+=`<div class="gantt-market" style="background:${ms.bg};color:${ms.txt}">${i===0?mkey:""}</div>`;
      h+=`<div class="gantt-uc" onmouseenter="st(event,'${d2}')" onmouseleave="ht()">${r.uc}</div>`;
      let col=0;
      while(col<12){
        if(col===si){
          const span=ei-si+1;
          h+=`<div class="gantt-bar" style="background:${cs.bg};color:${cs.txt};grid-column:span ${span}" onmouseenter="st(event,'${d2}')" onmouseleave="ht()">${ms.code}: ${r.uc}</div>`;
          col=ei+1;
        } else {
          h+="<div class='gantt-cell'></div>";col++;
        }
      }
      h+="</div>";
    });
    h+="<div class='gantt-spacer'></div>";
  });
  document.getElementById("ggrid").innerHTML=h;
}

function st(e,b64){
  const r=JSON.parse(decodeURIComponent(escape(atob(b64))));
  const sc=SS[r.status]||"#6B7280";
  document.getElementById("tt-uc").textContent=r.uc;
  document.getElementById("tt-market").textContent=r.market;
  document.getElementById("tt-cat").textContent=r.category;
  document.getElementById("tt-timeline").textContent=r.start===r.golive?r.golive:`${r.start} → ${r.golive}`;
  document.getElementById("tt-status").innerHTML=`<span class="sdot" style="background:${sc}"></span>${r.status}`;
  document.getElementById("tt-priority").textContent=r.priority||"—";
  const dd=document.getElementById("tt-desc");
  dd.textContent=r.description||"";dd.style.display=r.description?"block":"none";
  const tt=document.getElementById("tooltip");
  tt.classList.add("visible");mt(e);
}
function mt(e){
  const tt=document.getElementById("tooltip");
  const x=e.clientX+16,y=e.clientY-10;
  tt.style.left=(x+290>window.innerWidth?x-300:x)+"px";
  tt.style.top=(y+200>window.innerHeight?y-180:y)+"px";
}
function ht(){document.getElementById("tooltip").classList.remove("visible");}
document.addEventListener("mousemove",e=>{if(document.getElementById("tooltip").classList.contains("visible"))mt(e);});

function switchView(n,t){
  document.querySelectorAll(".view-tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  document.getElementById("view-"+n).classList.add("active");
}

function render(){
  const d=filtered();
  renderStats(d);renderLegend(d);renderRoadmap(d);renderGantt(d);
}
buildFilters();render();
</script>
</body>
</html>
